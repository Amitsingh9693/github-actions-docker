name: Docker Ci pipeline

on:
  push:
    branches:
       -main

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
           - name: Checkout code
             uses: actions/checkout@v4
            
           - name: Login to DockerHub
             uses: docker/login-action@v2
             with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}
            
           - name: Build image
             run: docker build -t amit9693/github-actions-docker:v1 .

           - name: Push image
             run: docker push amit9693/github-actions-docker:v1
